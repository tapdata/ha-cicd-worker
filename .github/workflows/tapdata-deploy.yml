name: TapData Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*tapdata_export/**'
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt
          - aat
          - prod
      project:
        description: 'Project name'
        required: true
        type: choice
        default: dmp
        options:
          - dmp

env:
  DEPLOY_DIR: /tmp/tapdata-deploy-${{ github.run_id }}
  # PR 触发时使用 head_ref（feat 分支），手动/Tag 触发时使用 ref_name
  DEPLOY_REF: ${{ github.head_ref || github.ref_name }}
  # PR 触发时固定 dev；创建 Tag 触发时固定 sit；手动触发时使用 inputs.target_env
  TARGET_ENV: ${{ github.event_name == 'pull_request' && 'dev' || startsWith(github.ref, 'refs/tags/') && 'sit' || inputs.target_env }}
  # 创建 Tag 触发时固定 dmp；其他场景默认 dmp 或使用手动输入
  PROJECT: ${{ inputs.project || 'dmp' }}

jobs:
  # ============================================================
  # Job 1: Preparation Phase
  # ============================================================
  preparation:
    name: Preparation Phase
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      tapdata_token: ${{ steps.get_token.outputs.tapdata_token }}
      last_stable_tag: ${{ steps.get_last_stable_tag.outputs.last_stable_tag }}
      target_env: ${{ env.TARGET_ENV }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Validate Input Parameters
        run: bash scripts/tapdata-deploy/validate-inputs.sh
        env:
          DEPLOYMENT_REF: ${{ env.DEPLOY_REF }}
          TARGET_ENV: ${{ env.TARGET_ENV }}
          PROJECT: ${{ env.PROJECT }}

      - name: Get TapData Token
        id: get_token
        run: bash scripts/common/get-token.sh
        env:
          TARGET_ENV: ${{ env.TARGET_ENV }}
          TAPDATA_ACCESSCODE: ${{ secrets[format('{0}_TAPDATA_ACCESSCODE', env.TARGET_ENV)] }}

      - name: Get Last Stable Tag
        id: get_last_stable_tag
        run: bash scripts/tapdata-deploy/get-last-stable-tag.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

  # ============================================================
  # Job 2: Deploy Connections
  # ============================================================
  deploy-connections:
    name: Deploy Connections
    runs-on: self-hosted
    timeout-minutes: 15
    environment: ${{ needs.preparation.outputs.target_env }}
    needs: preparation
    outputs:
      changed_connections: ${{ steps.import_connections.outputs.changed_connections }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Generate vault.json with Connection Secrets
        run: bash scripts/tapdata-deploy/generate-vault.sh
        env:
          PROJECT: ${{ env.PROJECT }}
          ALL_SECRETS: ${{ toJSON(secrets) }}

      - name: Compress Export Files
        run: bash scripts/common/compress-files.sh
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: connections-export.tar
          PROJECT: ${{ env.PROJECT }}

      - name: Import Connections via TapData API
        id: import_connections
        run: bash scripts/common/import-resource.sh connections
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: connections-export.tar
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ env.TARGET_ENV }}


  # ============================================================
  # Job 3: Deploy Tasks
  # ============================================================
  deploy-tasks:
    name: Deploy Tasks
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [preparation, deploy-connections]
    outputs:
      changed_tasks: ${{ steps.import_tasks.outputs.changed_tasks }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Compress Export Files
        run: bash scripts/common/compress-files.sh
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: tasks-export.tar
          PROJECT: ${{ env.PROJECT }}

      - name: Import Tasks via TapData API
        id: import_tasks
        run: bash scripts/common/import-resource.sh tasks
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: tasks-export.tar
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ env.TARGET_ENV }}

  # ============================================================
  # Job 4: Deploy APIs
  # ============================================================
  deploy-apis:
    name: Deploy APIs
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [preparation, deploy-tasks]
    outputs:
      changed_apis: ${{ steps.import_apis.outputs.changed_apis }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Compress Export Files
        run: bash scripts/common/compress-files.sh
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: apis-export.tar
          PROJECT: ${{ env.PROJECT }}

      - name: Import APIs via TapData API
        id: import_apis
        run: bash scripts/common/import-resource.sh apis
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: apis-export.tar
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ env.TARGET_ENV }}

  # ============================================================
  # Job 5: Deploy Group Info
  # ============================================================
  deploy-group-info:
    name: Deploy Group Info
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [preparation, deploy-apis]
    outputs:
      changed_groupInfo: ${{ steps.import_group_info.outputs.changed_groupInfo }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Compress Export Files
        run: bash scripts/common/compress-files.sh
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: groupInfo-export.tar
          PROJECT: ${{ env.PROJECT }}

      - name: Import Group Info via TapData API
        id: import_group_info
        run: bash scripts/common/import-resource.sh groupInfo
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          ARCHIVE_NAME: groupInfo-export.tar
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ env.TARGET_ENV }}

  # ============================================================
  # Job 5: Generate Deployment Report
  # ============================================================
  generate-report:
    name: Generate Deployment Report
    runs-on: self-hosted
    timeout-minutes: 5
    if: always()
    needs: [preparation, deploy-connections, deploy-tasks, deploy-apis, deploy-group-info]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_REF }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          fetch-depth: 0

      - name: Collect Deployment Results
        run: bash scripts/tapdata-deploy/generate-report.sh
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          DEPLOYMENT_REF: ${{ env.DEPLOY_REF }}
          TARGET_ENV: ${{ env.TARGET_ENV }}
          PROJECT: ${{ env.PROJECT }}
          GITHUB_ACTOR: ${{ github.actor }}
          LAST_STABLE_TAG: ${{ needs.preparation.outputs.last_stable_tag }}
          CHANGED_CONNECTIONS: ${{ needs.deploy-connections.outputs.changed_connections }}
          CHANGED_TASKS: ${{ needs.deploy-tasks.outputs.changed_tasks }}
          CHANGED_APIS: ${{ needs.deploy-apis.outputs.changed_apis }}
          CHANGED_GROUP_INFO: ${{ needs.deploy-group-info.outputs.changed_groupInfo }}
          PREPARATION_RESULT: ${{ needs.preparation.result }}
          CONNECTIONS_RESULT: ${{ needs.deploy-connections.result }}
          TASKS_RESULT: ${{ needs.deploy-tasks.result }}
          APIS_RESULT: ${{ needs.deploy-apis.result }}
          GROUP_INFO_RESULT: ${{ needs.deploy-group-info.result }}

