name: TapData Rollback

on:
  workflow_call:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: string
      last_stable_tag:
        description: 'Tag to rollback to (if empty, will auto-detect latest stable tag)'
        required: false
        type: string
        default: ''

env:
  ROLLBACK_DIR: /tmp/tapdata-rollback-${{ github.run_id }}

jobs:
  # ============================================================
  # Job 1: Preparation Phase
  # ============================================================
  preparation:
    name: Preparation Phase
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      tapdata_token: ${{ steps.get_token.outputs.tapdata_token }}
      last_stable_tag: ${{ steps.resolve_tag.outputs.last_stable_tag }}
      target_env: ${{ inputs.target_env }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          fetch-depth: 0

      - name: Validate Input Parameters
        run: bash scripts/tapdata-rollback/validate-inputs.sh
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          LAST_STABLE_TAG: ${{ inputs.last_stable_tag }}

      - name: Get TapData Token
        id: get_token
        run: bash scripts/common/get-token.sh
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          TAPDATA_ACCESSCODE: ${{ secrets[format('{0}_TAPDATA_ACCESSCODE', inputs.target_env)] }}

      - name: Resolve Rollback Tag
        id: resolve_tag
        run: bash scripts/tapdata-rollback/resolve-tag.sh
        env:
          LAST_STABLE_TAG: ${{ inputs.last_stable_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

  # ============================================================
  # Job 2: Stop Tasks
  # ============================================================
  stop-tasks:
    name: Stop Tasks
    runs-on: self-hosted
    timeout-minutes: 10
    needs: preparation
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preparation.outputs.last_stable_tag }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Stop All Tasks
        run: bash scripts/tapdata-rollback/stop-tasks.sh
        env:
          ROLLBACK_DIR: ${{ env.ROLLBACK_DIR }}
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ needs.preparation.outputs.target_env }}

  # ============================================================
  # Job 3: Stop APIs
  # ============================================================
  stop-apis:
    name: Stop APIs
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [preparation, stop-tasks]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preparation.outputs.last_stable_tag }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Unpublish All APIs
        run: bash scripts/tapdata-rollback/unpublish-apis.sh
        env:
          ROLLBACK_DIR: ${{ env.ROLLBACK_DIR }}
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ needs.preparation.outputs.target_env }}

  # ============================================================
  # Job 4: Clean Resources
  # ============================================================
  clean-resources:
    name: Clean Resources
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [preparation, stop-apis]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preparation.outputs.last_stable_tag }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clean All Resources
        run: bash scripts/tapdata-rollback/clean-resources.sh
        env:
          ROLLBACK_DIR: ${{ env.ROLLBACK_DIR }}
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ needs.preparation.outputs.target_env }}

  # ============================================================
  # Job 5: Import Resources
  # ============================================================
  import-resources:
    name: Import Resources
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [preparation, clean-resources]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preparation.outputs.last_stable_tag }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Import All Resources
        run: bash scripts/tapdata-rollback/import-resources.sh
        env:
          ROLLBACK_DIR: ${{ env.ROLLBACK_DIR }}
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ needs.preparation.outputs.target_env }}

  # ============================================================
  # Job 6: Start Tasks & Publish APIs
  # ============================================================
  start-and-publish:
    name: Start Tasks & Publish APIs
    runs-on: self-hosted
    timeout-minutes: 15
    needs: [preparation, import-resources]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preparation.outputs.last_stable_tag }}
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Start Tasks and Publish APIs
        run: bash scripts/tapdata-rollback/start-and-publish.sh
        env:
          ROLLBACK_DIR: ${{ env.ROLLBACK_DIR }}
          TAPDATA_TOKEN: ${{ needs.preparation.outputs.tapdata_token }}
          TARGET_ENV: ${{ needs.preparation.outputs.target_env }}
